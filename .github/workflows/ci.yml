# Minimal CI for CulinAIre Mobile.
#
# Mirrors the local pre-push gates documented in CLAUDE.md § "Git Workflow":
# lint → tsc → test. Runs on every PR + push to main.
#
# Out of scope (deliberately):
#   - Contract tests (`pnpm test:contract`) — those hit the live web backend
#     and need test creds; gate behind a secret in a follow-up if useful.
#   - Android build — slow + needs the JDK setup pain. Local `pnpm android`
#     covers the device path; CI for it is a separate decision.
#   - iOS build — Android-only project right now.
#   - Detox / E2E — P2 work; add when the suite exists.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: lint / tsc / test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pin to match local dev (`pnpm --version` → 10.x). Bump deliberately
          # — pnpm 10 lockfile format is not backwards-compatible with pnpm 9.
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        # --frozen-lockfile fails fast if pnpm-lock.yaml drifts from package.json.
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm test
